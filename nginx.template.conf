# Custom Nginx Template for Railway
# Handles .html files as PHP internally, so you can keep your .html URLs

server {
    listen ${PORT};
    server_name _;
    root /app;
    index index.php index.html;

    # The main rewrite rule:
    # If a user visits /page.html, we check if /page.php exists.
    # If it does, we serve it. This allows keeping .html in the browser.
    rewrite ^/(.*)\.html$ /$1.php last;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to FastCGI server
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to .sql files
    location ~ \.sql$ {
        deny all;
    }

    # Custom 404
    error_page 404 /index.php;
}
